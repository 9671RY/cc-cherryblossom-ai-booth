name = "cc-cherryblossom-ai-booth"
compatibility_date = "2024-03-20"
pages_build_output_dir = "dist"

# 환경변수 (개발/배포 공통)
[vars]
# 사용자가 제공한 Gemini API 키는 보안상 GitHub 비밀로 등록하는 것이 좋지만,
# 배포 시엔 `npx wrangler secret put GEMINI_API_KEY` 명령어로 안전하게 업로드해야 합니다.

[[d1_databases]]
binding = "D1_DB" # 이 바인딩 소문자/소문자 통칭 주의
database_name = "cherryblossom-db"
database_id = "3187b66f-ec1c-4a07-9bcc-21d144246c0f" # Cloudflare 대시보드에서 생성 후 삽입

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "cherryblossom-photos"
